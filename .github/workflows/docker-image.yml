name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate Docker Compose configuration
      run: docker compose config --quiet

    - name: Build backend image
      run: docker build ./platform/backend --tag spectra-backend:${{ github.sha }}

    - name: Build frontend image
      run: docker build ./platform/frontend --tag spectra-frontend:${{ github.sha }}

    - name: Build scanner image
      run: docker build . --file Dockerfile.scanner --tag spectra-scanner:${{ github.sha }}
