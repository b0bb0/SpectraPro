name: "Copilot Setup Steps"

# Run when the workflow file changes (so you can validate it) and allow manual runs.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # This job name must remain exactly "copilot-setup-steps" for Copilot to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository (includes LFS assets)
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            platform/backend/package-lock.json
            platform/frontend/package-lock.json

      - name: Install backend dependencies (no postinstall scripts)
        working-directory: platform/backend
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        working-directory: platform/frontend
        run: npm ci

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
